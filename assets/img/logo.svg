<svg width="56" height="56" viewBox="0 0 56 56" xmlns="http://www.w3.org/2000/svg">
  <rect width="56" height="56" rx="12" fill="#100d20"/>
  <g transform="translate(28,28)">

    <!-- 4 orbital rings at 0°/45°/90°/135° -->
    <ellipse rx="22" ry="9" fill="none" stroke="#c06dc4" stroke-width="1.9" opacity="0.92"/>
    <ellipse rx="22" ry="9" fill="none" stroke="#c06dc4" stroke-width="1.9" opacity="0.92" transform="rotate(45)"/>
    <ellipse rx="22" ry="9" fill="none" stroke="#c06dc4" stroke-width="1.9" opacity="0.92" transform="rotate(90)"/>
    <ellipse rx="22" ry="9" fill="none" stroke="#c06dc4" stroke-width="1.9" opacity="0.92" transform="rotate(135)"/>

    <!-- Large tip dots: ends of the 0°/90° ellipses -->
    <circle cx="22"  cy="0"   r="2.6" fill="#e879c0"/>
    <circle cx="-22" cy="0"   r="2.6" fill="#e879c0"/>
    <circle cx="0"   cy="22"  r="2.6" fill="#e879c0"/>
    <circle cx="0"   cy="-22" r="2.6" fill="#e879c0"/>
    <!-- Large tip dots: ends of the 45°/135° ellipses -->
    <circle cx="15.6"  cy="15.6"  r="2.6" fill="#e879c0"/>
    <circle cx="-15.6" cy="-15.6" r="2.6" fill="#e879c0"/>
    <circle cx="15.6"  cy="-15.6" r="2.6" fill="#e879c0"/>
    <circle cx="-15.6" cy="15.6"  r="2.6" fill="#e879c0"/>

    <!-- Smaller accent dots in the spaces between orbits -->
    <circle cx="10"  cy="-6"  r="1.2" fill="#e879c0" opacity="0.55"/>
    <circle cx="-10" cy="6"   r="1.2" fill="#e879c0" opacity="0.55"/>
    <circle cx="6"   cy="10"  r="1.2" fill="#e879c0" opacity="0.55"/>
    <circle cx="-6"  cy="-10" r="1.2" fill="#e879c0" opacity="0.55"/>

    <!-- Inner sanctum circle -->
    <circle cx="0" cy="0" r="8.5" fill="#100d20" stroke="#c06dc4" stroke-width="1.0" opacity="0.85"/>

    <!-- ══ Yantra: diamond with crossing arms and 4 looped cardinal extensions ══ -->
    <!-- Diamond outline (rhombus, corners at N/E/S/W) -->
    <line x1="0"    y1="-4.6" x2="4.6"  y2="0"    stroke="#d4a644" stroke-width="0.95" stroke-linecap="round"/>
    <line x1="4.6"  y1="0"    x2="0"    y2="4.6"  stroke="#d4a644" stroke-width="0.95" stroke-linecap="round"/>
    <line x1="0"    y1="4.6"  x2="-4.6" y2="0"    stroke="#d4a644" stroke-width="0.95" stroke-linecap="round"/>
    <line x1="-4.6" y1="0"    x2="0"    y2="-4.6" stroke="#d4a644" stroke-width="0.95" stroke-linecap="round"/>
    <!-- Inner cross — N to S and W to E — crossing at centre -->
    <line x1="0"    y1="-4.6" x2="0"    y2="4.6"  stroke="#d4a644" stroke-width="0.8"  stroke-linecap="round"/>
    <line x1="-4.6" y1="0"    x2="4.6"  y2="0"    stroke="#d4a644" stroke-width="0.8"  stroke-linecap="round"/>
    <!-- North arm and loop -->
    <line x1="0" y1="-4.6" x2="0" y2="-5.75" stroke="#d4a644" stroke-width="0.95"/>
    <circle cx="0"    cy="-6.85" r="1.1"  fill="none" stroke="#d4a644" stroke-width="0.95"/>
    <!-- South arm and loop -->
    <line x1="0" y1="4.6"  x2="0" y2="5.75"  stroke="#d4a644" stroke-width="0.95"/>
    <circle cx="0"    cy="6.85"  r="1.1"  fill="none" stroke="#d4a644" stroke-width="0.95"/>
    <!-- East arm and loop -->
    <line x1="4.6"  y1="0"  x2="5.7"  y2="0" stroke="#d4a644" stroke-width="0.95"/>
    <circle cx="6.7"  cy="0"     r="0.95" fill="none" stroke="#d4a644" stroke-width="0.95"/>
    <!-- West arm and loop -->
    <line x1="-4.6" y1="0"  x2="-5.7" y2="0" stroke="#d4a644" stroke-width="0.95"/>
    <circle cx="-6.7" cy="0"     r="0.95" fill="none" stroke="#d4a644" stroke-width="0.95"/>
    <!-- Central bindu -->
    <circle cx="0" cy="0" r="1.05" fill="#d4a644"/>

  </g>
</svg>
