<svg width="56" height="56" viewBox="0 0 56 56" xmlns="http://www.w3.org/2000/svg">
  <rect width="56" height="56" rx="12" fill="#100d20"/>
  <g transform="translate(28,28)">

    <!-- 4 orbital rings at 0°/45°/90°/135° -->
    <ellipse rx="22" ry="9" fill="none" stroke="#c06dc4" stroke-width="1.9" opacity="0.92"/>
    <ellipse rx="22" ry="9" fill="none" stroke="#c06dc4" stroke-width="1.9" opacity="0.92" transform="rotate(45)"/>
    <ellipse rx="22" ry="9" fill="none" stroke="#c06dc4" stroke-width="1.9" opacity="0.92" transform="rotate(90)"/>
    <ellipse rx="22" ry="9" fill="none" stroke="#c06dc4" stroke-width="1.9" opacity="0.92" transform="rotate(135)"/>

    <!-- Large tip dots: ends of the 0°/90° ellipses -->
    <circle cx="22"  cy="0"   r="2.6" fill="#e879c0"/>
    <circle cx="-22" cy="0"   r="2.6" fill="#e879c0"/>
    <circle cx="0"   cy="22"  r="2.6" fill="#e879c0"/>
    <circle cx="0"   cy="-22" r="2.6" fill="#e879c0"/>
    <!-- Large tip dots: ends of the 45°/135° ellipses -->
    <circle cx="15.6"  cy="15.6"  r="2.6" fill="#e879c0"/>
    <circle cx="-15.6" cy="-15.6" r="2.6" fill="#e879c0"/>
    <circle cx="15.6"  cy="-15.6" r="2.6" fill="#e879c0"/>
    <circle cx="-15.6" cy="15.6"  r="2.6" fill="#e879c0"/>

    <!-- Smaller accent dots in the spaces between orbits -->
    <circle cx="10"  cy="-6"  r="1.2" fill="#e879c0" opacity="0.55"/>
    <circle cx="-10" cy="6"   r="1.2" fill="#e879c0" opacity="0.55"/>
    <circle cx="6"   cy="10"  r="1.2" fill="#e879c0" opacity="0.55"/>
    <circle cx="-6"  cy="-10" r="1.2" fill="#e879c0" opacity="0.55"/>

    <!-- Inner sanctum circle -->
    <circle cx="0" cy="0" r="8.5" fill="#100d20" stroke="#c06dc4" stroke-width="1.0" opacity="0.85"/>

    <!-- ══ YANTRA ══
         4 crossing arms drawn first (below teardrops).
         Each arm: exits teardrop inner-oval side → crosses at teardrop tip (lasso knot) →
                   continues to left/right crossing → continues to scroll tip.
         N/S teardrops drawn on top — fill covers arm starts, leaving knot + diamond visible. -->

    <!-- Path A (\): N-inner-left → crosses knot (0,−3.8) → right-cross → E-lower tip -->
    <path d="M -0.7,-4.2 C 0.5,-3.6 2.3,-1.8 3.8,0 C 4.8,0.8 5.5,2.0 5.8,2.5"
          fill="none" stroke="#d4a644" stroke-width="1.2" stroke-linecap="round"/>
    <!-- Path B (/): N-inner-right → crosses knot → left-cross → W-lower tip -->
    <path d="M 0.7,-4.2 C -0.5,-3.6 -2.3,-1.8 -3.8,0 C -4.8,0.8 -5.5,2.0 -5.8,2.5"
          fill="none" stroke="#d4a644" stroke-width="1.2" stroke-linecap="round"/>
    <!-- Path C (\): S-inner-right → crosses knot (0,3.8) → left-cross → W-upper tip -->
    <path d="M 0.7,4.2 C -0.5,3.6 -2.3,1.8 -3.8,0 C -4.8,-0.8 -5.5,-2.0 -5.8,-2.5"
          fill="none" stroke="#d4a644" stroke-width="1.2" stroke-linecap="round"/>
    <!-- Path D (/): S-inner-left → crosses knot → right-cross → E-upper tip -->
    <path d="M -0.7,4.2 C 0.5,3.6 2.3,1.8 3.8,0 C 4.8,-0.8 5.5,-2.0 5.8,-2.5"
          fill="none" stroke="#d4a644" stroke-width="1.2" stroke-linecap="round"/>

    <!-- N teardrop outer (map-pin shape, tip at lasso knot) — fill covers arm starts -->
    <path d="M 0,-3.8 C -2.5,-4.2 -3.5,-6.0 -2.8,-7.2 C -2.0,-7.8 2.0,-7.8 2.8,-7.2 C 3.5,-6.0 2.5,-4.2 0,-3.8 Z"
          fill="#100d20" stroke="#d4a644" stroke-width="1.2" stroke-linejoin="round"/>
    <!-- N inner oval (creates double-ring hole-in-teardrop visual) -->
    <ellipse cx="0" cy="-5.9" rx="0.9" ry="1.0" fill="#100d20" stroke="#d4a644" stroke-width="1.0"/>

    <!-- S teardrop outer (mirrored) -->
    <path d="M 0,3.8 C -2.5,4.2 -3.5,6.0 -2.8,7.2 C -2.0,7.8 2.0,7.8 2.8,7.2 C 3.5,6.0 2.5,4.2 0,3.8 Z"
          fill="#100d20" stroke="#d4a644" stroke-width="1.2" stroke-linejoin="round"/>
    <!-- S inner oval -->
    <ellipse cx="0" cy="5.9" rx="0.9" ry="1.0" fill="#100d20" stroke="#d4a644" stroke-width="1.0"/>

    <!-- Scroll tip circles (small open rings — drawn on top of arm ends) -->
    <circle cx="5.8"  cy="2.5"  r="0.65" fill="#100d20" stroke="#d4a644" stroke-width="0.9"/>
    <circle cx="-5.8" cy="2.5"  r="0.65" fill="#100d20" stroke="#d4a644" stroke-width="0.9"/>
    <circle cx="-5.8" cy="-2.5" r="0.65" fill="#100d20" stroke="#d4a644" stroke-width="0.9"/>
    <circle cx="5.8"  cy="-2.5" r="0.65" fill="#100d20" stroke="#d4a644" stroke-width="0.9"/>

  </g>
</svg>
